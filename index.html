<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Galicia - Guía para amigos</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Galicia">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-paper: #ffffff;
      --bg-cream: #faf8f5;
      --bg-card: #f5f3ee;
      --fg-ink: #2c2416;
      --fg-muted: #5a4d3a;
      --accent-sea: #1a4a5e;
      --accent-gold: #b8860b;
      --accent-green: #3d5a47;
      --accent-red: #c45a3f;
      --border-aged: #e0d8c8;
      --border-card: #8b7355;
      --shadow-warm: rgba(44, 36, 22, 0.1);
      --bloque-acoruna: #3a7ca5;
      --bloque-lugo: #4a8c5a;
      --bloque-ourense: #c47a3a;
      --bloque-pontevedra: #2a8a8a;
      --cat-ciudades: #8b5a2b;
      --cat-villas: #6b8e4a;
      --cat-pueblos: #4a7a8e;
      --cat-costa: #c47a3a;
      --cat-naturaleza: #4a9a6a;
      --cat-patrimonio: #8a6a9a;
      --cat-magicos: #9a4a6a;
      --cat-termalismo: #4a8a9a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; scroll-snap-type: y proximity; }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; scroll-snap-type: none; }
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    body { font-family: 'Crimson Pro', Georgia, serif; background: var(--bg-paper); color: var(--fg-ink); line-height: 1.7; font-size: 18px; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
    h1, h2, h3 { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 600; }

    .install-banner { position: fixed; bottom: 80px; left: 16px; right: 16px; background: var(--accent-sea); color: white; padding: 14px 16px; border-radius: 14px; display: none; align-items: center; justify-content: space-between; gap: 12px; z-index: 9998; box-shadow: 0 4px 20px rgba(0,0,0,0.25); }
    .install-banner.visible { display: flex; }
    .install-banner-text { font-size: 0.9rem; }
    .install-banner-text strong { display: block; font-size: 1rem; margin-bottom: 2px; }
    .install-banner-btn { background: white; color: var(--accent-sea); border: none; padding: 10px 18px; border-radius: 8px; font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .install-banner-close { background: none; border: none; color: white; opacity: 0.7; cursor: pointer; padding: 4px; font-size: 1.2rem; }

    .splash-screen { position: fixed; inset: 0; z-index: 9999; background: linear-gradient(180deg, #F8F6F1 0%, #F5F3EE 50%, #F0EDE5 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); transition: opacity 0.5s ease, visibility 0.5s ease; }
    .splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-content { width: 100%; max-width: 400px; text-align: center; }
    .splash-icon { margin-bottom: 24px; }
    .splash-title { font-size: clamp(3rem, 12vw, 4rem); font-weight: 700; color: var(--accent-sea); line-height: 1; margin-bottom: 8px; }
    .splash-subtitle { font-size: 1.1rem; color: var(--fg-muted); font-style: italic; margin-bottom: 36px; }
    .splash-form { display: flex; flex-direction: column; gap: 16px; }
    .splash-input { width: 100%; padding: 16px 20px; background: var(--bg-paper); border: 2px solid var(--border-aged); border-radius: 12px; font-family: inherit; font-size: 1.1rem; color: var(--fg-ink); text-align: center; letter-spacing: 0.1em; transition: border-color 0.2s ease; }
    .splash-input:focus { outline: none; border-color: var(--accent-sea); }
    .splash-input::placeholder { color: var(--fg-muted); letter-spacing: normal; }
    .splash-input.error { border-color: #c45a3f; animation: shake 0.4s ease; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
    .splash-btn { width: 100%; padding: 16px; background: var(--accent-sea); color: white; border: none; border-radius: 12px; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
    .splash-btn:hover { background: #143a4a; }
    .splash-error { color: #c45a3f; font-size: 0.9rem; min-height: 1.4em; }
    .splash-footer { margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border-aged); }
    .splash-footer-text { font-size: 0.85rem; color: var(--fg-muted); line-height: 1.6; }
    .splash-footer-note { font-size: 0.75rem; color: var(--fg-muted); opacity: 0.7; margin-top: 12px; font-style: italic; }

    .main-content { display: none; padding-bottom: calc(70px + env(safe-area-inset-bottom)); }
    .main-content.visible { display: block; }

    .hero { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; padding-top: calc(20px + env(safe-area-inset-top)); scroll-snap-align: start; }
    .hero-title { font-size: clamp(3.5rem, 14vw, 5.5rem); font-weight: 700; color: var(--accent-sea); line-height: 1; margin-bottom: 14px; }
    .hero-subtitle { font-size: clamp(1.2rem, 5vw, 1.6rem); color: var(--fg-muted); font-style: italic; margin-bottom: 28px; }
    .hero-authors { margin-top: 24px; width: 100%; }
    .authors-column { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .author-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
    .author-avatar { width: 72px; height: 72px; border-radius: 50%; border: 3px solid var(--border-aged); background: var(--bg-cream); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 600; color: var(--fg-muted); overflow: hidden; flex-shrink: 0; }
    .author-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .author-name { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; color: var(--accent-sea); }

    section { min-height: 100vh; min-height: 100dvh; padding: 60px 20px; max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; justify-content: flex-start; scroll-snap-align: start; scroll-snap-stop: always; }
    section#lugares { min-height: auto; padding-bottom: 100px; }
    section#generador { min-height: auto; }

    .decorative-divider { display: flex; align-items: center; gap: 16px; padding: 12px 20px; max-width: 680px; margin: 0 auto; }
    .decorative-divider::before, .decorative-divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--border-aged), transparent); }
    .decorative-divider svg { width: 18px; height: 18px; color: var(--accent-gold); flex-shrink: 0; }

    .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .section-number { width: 44px; height: 44px; border: 3px solid var(--accent-sea); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 700; color: var(--accent-sea); flex-shrink: 0; background: var(--bg-paper); }
    .section-title { font-size: clamp(1.5rem, 5vw, 1.9rem); color: var(--accent-sea); margin: 0; }

    .prose p { margin-bottom: 16px; text-align: justify; }

    .quote { position: relative; padding: 20px 20px 20px 28px; margin: 24px 0; background: linear-gradient(90deg, rgba(26, 74, 94, 0.05), transparent); border-left: 3px solid var(--accent-sea); font-style: italic; }
    .quote::before { content: '"'; position: absolute; top: 6px; left: 8px; font-family: 'Cormorant Garamond', serif; font-size: 3rem; color: var(--accent-sea); opacity: 0.2; line-height: 1; }
    .quote-author { display: block; margin-top: 12px; font-style: normal; font-weight: 500; color: var(--fg-muted); font-size: 0.9rem; }

    .rec-author-section { margin-top: 24px; }
    .rec-author-section:first-of-type { margin-top: 0; }
    .carousel-wrapper { position: relative; width: 100%; }
    .carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; scrollbar-width: none; gap: 0; }
    .carousel::-webkit-scrollbar { display: none; }
    .carousel-card { flex: 0 0 100%; width: 100%; scroll-snap-align: center; padding: 0 4px; }
    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; background: var(--bg-paper); border: 2px solid var(--border-aged); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; transition: all 0.2s ease; box-shadow: 0 2px 8px var(--shadow-warm); }
    .carousel-btn:hover { background: var(--bg-cream); border-color: var(--accent-sea); }
    .carousel-btn-prev { left: -8px; }
    .carousel-btn-next { right: -8px; }
    .carousel-btn svg { width: 18px; height: 18px; stroke: var(--accent-sea); }
    .carousel-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .rec-author-card { background: var(--bg-cream); border: 2px solid var(--border-aged); border-radius: 14px; padding: 28px 20px; text-align: center; }
    .rec-author-avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--border-aged); object-fit: cover; margin: 0 auto 16px; }
    .rec-author-name { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; color: var(--accent-sea); margin-bottom: 4px; }
    .rec-author-subtitle { font-size: 0.85rem; color: var(--fg-muted); font-style: italic; }
    .rec-card { background: var(--bg-card); border: 2px solid var(--border-aged); border-radius: 14px; padding: 22px 20px; min-height: 140px; display: flex; flex-direction: column; justify-content: center; }
    .rec-title { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 600; color: var(--fg-ink); margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
    .rec-icon { font-size: 1.3rem; flex-shrink: 0; }
    .rec-text { font-size: 0.95rem; color: var(--fg-muted); line-height: 1.55; }

    /* BLOQUES - PROVINCIAS */
    .bloque-card { margin: 20px 0; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 16px var(--shadow-warm); position: relative; border: 2px solid var(--border-aged); }
    
    .bloque-header { 
      padding: 0; 
      cursor: pointer; 
      position: relative; 
      transition: all 0.3s ease; 
      display: flex;
      align-items: stretch;
    }
    
    .bloque-header.acoruna { background: linear-gradient(135deg, rgba(58, 124, 165, 0.25) 0%, rgba(58, 124, 165, 0.15) 100%); }
    .bloque-header.lugo { background: linear-gradient(135deg, rgba(74, 140, 90, 0.25) 0%, rgba(74, 140, 90, 0.15) 100%); }
    .bloque-header.ourense { background: linear-gradient(135deg, rgba(196, 122, 58, 0.25) 0%, rgba(196, 122, 58, 0.15) 100%); }
    .bloque-header.pontevedra { background: linear-gradient(135deg, rgba(42, 138, 138, 0.25) 0%, rgba(42, 138, 138, 0.15) 100%); }
    
    .bloque-map-sidebar {
      width: 80px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      background: rgba(255,255,255,0.3);
      border-right: 1px solid var(--border-aged);
    }
    
    .bloque-map-mini { 
      width: 56px; 
      height: 56px; 
      border-radius: 8px; 
      overflow: hidden; 
      background: rgba(0,0,0,0.03); 
      border: 1px solid var(--border-aged);
    }
    .bloque-map-mini img { 
      width: 100%; 
      height: 100%; 
      object-fit: contain; 
      display: block; 
    }
    
    .bloque-body {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 14px 16px;
      min-width: 0;
    }
    
    .bloque-content-wrapper {
      flex: 1;
      min-width: 0;
    }
    
    .bloque-emoji { 
      font-size: 1.8rem; 
      margin-right: 10px; 
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1)); 
      flex-shrink: 0;
      vertical-align: middle;
      display: inline-block;
    }
    
    .bloque-nombre { 
      font-family: 'Cormorant Garamond', serif; 
      font-size: clamp(1.2rem, 4vw, 1.5rem); 
      font-weight: 700; 
      color: var(--fg-ink); 
      line-height: 1.2; 
      display: inline;
      vertical-align: middle;
    }
    
    .bloque-subtitulo { 
      display: block;
      font-size: 0.75rem; 
      color: var(--fg-muted); 
      font-style: italic; 
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .bloque-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding-left: 12px;
      flex-shrink: 0;
    }
    
    .bloque-contador { 
      background: rgba(0,0,0,0.05); 
      color: var(--fg-muted); 
      padding: 4px 10px; 
      border-radius: 14px; 
      font-size: 0.7rem; 
      font-weight: 600; 
      white-space: nowrap; 
    }
    
    .bloque-arrow { 
      width: 28px; 
      height: 28px; 
      background: rgba(0,0,0,0.04); 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      transition: all 0.3s ease; 
    }
    .bloque-arrow svg { width: 16px; height: 16px; stroke: var(--fg-muted); transition: transform 0.3s ease; }
    .bloque-card.expanded .bloque-arrow { background: rgba(0,0,0,0.08); }
    .bloque-card.expanded .bloque-arrow svg { transform: rotate(180deg); }
    
    .bloque-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; background: var(--bg-cream); }
    .bloque-card.expanded .bloque-content { max-height: 10000px; }
    .bloque-content-inner { padding: 20px; }

    /* TARJETAS LUGARES */
    .place-card { background: var(--bg-card); border: 2px solid var(--border-card); border-radius: 10px; overflow: hidden; margin-bottom: 14px; box-shadow: 0 3px 12px var(--shadow-warm); position: relative; transition: box-shadow 0.3s ease; }
    .place-card:hover { box-shadow: 0 5px 18px var(--shadow-warm); }
    .place-card.acoruna::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--bloque-acoruna); z-index: 1; }
    .place-card.lugo::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--bloque-lugo); z-index: 1; }
    .place-card.ourense::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--bloque-ourense); z-index: 1; }
    .place-card.pontevedra::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--bloque-pontevedra); z-index: 1; }
    .place-card.acoruna .place-number-badge { background: var(--bloque-acoruna); }
    .place-card.lugo .place-number-badge { background: var(--bloque-lugo); }
    .place-card.ourense .place-number-badge { background: var(--bloque-ourense); }
    .place-card.pontevedra .place-number-badge { background: var(--bloque-pontevedra); }

    .place-image { position: relative; height: 180px; overflow: hidden; background: var(--bg-cream); }
    .place-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .place-number-badge { position: absolute; top: 10px; right: 10px; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 700; color: white; box-shadow: 0 2px 6px rgba(0,0,0,0.25); z-index: 6; }
    .place-title-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 28px 12px 10px; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); z-index: 4; }
    .place-title { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600; color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.5); margin: 0; }

    /* BARRA INFERIOR CON MÚLTIPLES CATEGORÍAS (SOLO TEXTO) */
    .place-header { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; border-top: 1px solid rgba(139, 115, 85, 0.2); }
    .place-header:hover { background: rgba(184, 134, 11, 0.05); }
    .place-header:focus { outline: none; background: rgba(184, 134, 11, 0.08); }
    
    .place-header-left { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; overflow-x: auto; scrollbar-width: none; }
    .place-header-left::-webkit-scrollbar { display: none; }
    
    .place-category-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      color: white;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .place-category-chip.ciudades { background: var(--cat-ciudades); }
    .place-category-chip.villas { background: var(--cat-villas); }
    .place-category-chip.pueblos { background: var(--cat-pueblos); }
    .place-category-chip.costa { background: var(--cat-costa); }
    .place-category-chip.naturaleza { background: var(--cat-naturaleza); }
    .place-category-chip.patrimonio { background: var(--cat-patrimonio); }
    .place-category-chip.magicos { background: var(--cat-magicos); }
    .place-category-chip.termalismo { background: var(--cat-termalismo); }
    
    .place-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: 8px; }
    
    .place-toggle-icon { width: 18px; height: 18px; transition: transform 0.3s ease; color: var(--fg-muted); }
    .place-card.expanded .place-toggle-icon { transform: rotate(180deg); }
    
    .place-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
    .place-card.expanded .place-content { max-height: 5000px; }
    .place-content-inner { padding: 14px; border-top: 1px solid rgba(139, 115, 85, 0.2); }

    .place-category-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .place-category-tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
    .place-category-tag.ciudades { background: rgba(139, 90, 43, 0.12); color: var(--cat-ciudades); }
    .place-category-tag.villas { background: rgba(107, 142, 74, 0.12); color: var(--cat-villas); }
    .place-category-tag.pueblos { background: rgba(74, 122, 142, 0.12); color: var(--cat-pueblos); }
    .place-category-tag.costa { background: rgba(196, 122, 58, 0.12); color: var(--cat-costa); }
    .place-category-tag.naturaleza { background: rgba(74, 154, 106, 0.12); color: var(--cat-naturaleza); }
    .place-category-tag.patrimonio { background: rgba(138, 106, 154, 0.12); color: var(--cat-patrimonio); }
    .place-category-tag.magicos { background: rgba(154, 74, 106, 0.12); color: var(--cat-magicos); }
    .place-category-tag.termalismo { background: rgba(74, 138, 154, 0.12); color: var(--cat-termalis
